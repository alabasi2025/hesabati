<div class="login-container">
  <!-- Three.js 3D Background -->
  <app-three-background variant="login"></app-three-background>

  <!-- Login Card -->
  <div class="login-card">
    <!-- Glow Effect -->
    <div class="card-glow"></div>

    <!-- Logo Section -->
    <div class="logo-section">
      <div class="logo-icon">
        <div class="logo-inner">
          <span class="material-icons-round">bolt</span>
        </div>
        <div class="logo-ring"></div>
        <div class="logo-ring ring-2"></div>
      </div>
      <h1 class="app-title">حساباتي</h1>
      <p class="app-subtitle">إدارة محطات الكهرباء والحسابات الشخصية</p>
    </div>

    <!-- Form Section -->
    <form (ngSubmit)="onLogin()" class="login-form">
      <!-- Error Message -->
      @if (error()) {
        <div class="error-message">
          <span class="material-icons-round">error_outline</span>
          <span>{{ error() }}</span>
        </div>
      }

      <!-- Username Field -->
      <div class="field-group">
        <label class="field-label">
          <span class="material-icons-round">person</span>
          اسم المستخدم
        </label>
        <div class="input-wrapper">
          <input
            type="text"
            class="input-3d"
            placeholder="أدخل اسم المستخدم"
            [ngModel]="username()"
            (ngModelChange)="username.set($event)"
            name="username"
            autocomplete="username"
          />
          <div class="input-highlight"></div>
        </div>
      </div>

      <!-- Password Field -->
      <div class="field-group">
        <label class="field-label">
          <span class="material-icons-round">lock</span>
          كلمة المرور
        </label>
        <div class="input-wrapper">
          <div class="password-wrapper">
            <input
              [type]="showPassword() ? 'text' : 'password'"
              class="input-3d"
              placeholder="أدخل كلمة المرور"
              [ngModel]="password()"
              (ngModelChange)="password.set($event)"
              name="password"
              autocomplete="current-password"
            />
            <button type="button" class="toggle-password" (click)="togglePassword()">
              <span class="material-icons-round">
                {{ showPassword() ? 'visibility_off' : 'visibility' }}
              </span>
            </button>
          </div>
          <div class="input-highlight"></div>
        </div>
      </div>

      <!-- Login Button -->
      <button type="submit" class="login-btn" [disabled]="isLoading()">
        @if (isLoading()) {
          <div class="spinner"></div>
          <span>جاري تسجيل الدخول...</span>
        } @else {
          <span class="material-icons-round">login</span>
          <span>تسجيل الدخول</span>
        }
        <div class="btn-shine"></div>
      </button>
    </form>

    <!-- Footer -->
    <div class="login-footer">
      <div class="footer-line"></div>
      <p>
        لا تملك حساباً؟
        <a routerLink="/register" class="register-link">إنشاء حساب جديد</a>
      </p>
      <p>نظام حساباتي &copy; 2026</p>
    </div>
  </div>
</div>
