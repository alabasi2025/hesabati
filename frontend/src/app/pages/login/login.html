<div class="login-page">
  <!-- Background -->
  <div class="login-bg"></div>

  <!-- Card -->
  <div class="login-card">

    <!-- Logo -->
    <div class="login-logo">
      <div class="logo-icon-wrap">
        <span class="material-icons-round">bolt</span>
      </div>
      <h1 class="app-name">حساباتي</h1>
      <p class="app-desc">نظام إدارة الحسابات المالية</p>
    </div>

    <!-- Form -->
    <form class="login-form" (submit)="$event.preventDefault(); onLogin()">

      <!-- Error -->
      @if (error()) {
        <div class="alert-error">
          <span class="material-icons-round">error_outline</span>
          <span>{{ error() }}</span>
        </div>
      }

      <!-- Username -->
      <div class="form-field">
        <label class="field-label">اسم المستخدم</label>
        <div class="input-with-icon">
          <span class="input-icon material-icons-round">person_outline</span>
          <input
            type="text"
            class="valex-input"
            placeholder="أدخل اسم المستخدم"
            [value]="username()"
            (input)="username.set($any($event.target).value)"
            autocomplete="username"
          />
        </div>
      </div>

      <!-- Password -->
      <div class="form-field">
        <label class="field-label">كلمة المرور</label>
        <div class="input-with-icon">
          <span class="input-icon material-icons-round">lock_outline</span>
          <input
            [type]="showPassword() ? 'text' : 'password'"
            class="valex-input has-toggle"
            placeholder="أدخل كلمة المرور"
            [value]="password()"
            (input)="password.set($any($event.target).value)"
            autocomplete="current-password"
          />
          <button type="button" class="toggle-btn" (click)="togglePassword()">
            <span class="material-icons-round">
              {{ showPassword() ? 'visibility_off' : 'visibility' }}
            </span>
          </button>
        </div>
      </div>

      <!-- Submit -->
      <button type="submit" class="btn-submit" [disabled]="isLoading()">
        @if (isLoading()) {
          <div class="btn-spinner"></div>
          <span>جاري تسجيل الدخول...</span>
        } @else {
          <span class="material-icons-round">login</span>
          <span>تسجيل الدخول</span>
        }
      </button>

    </form>

    <!-- Footer -->
    <div class="login-footer">
      <span class="footer-text">لا تملك حساباً؟</span>
      <a routerLink="/register" class="footer-link">إنشاء حساب جديد</a>
    </div>

  </div>
</div>
