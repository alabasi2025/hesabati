<div class="auth-container">
  <app-css-background variant="login"></app-css-background>

  <div class="auth-card">
    <div class="card-glow"></div>

    <div class="logo-section">
      <div class="logo-icon">
        <div class="logo-inner">
          <span class="material-icons-round">person_add</span>
        </div>
      </div>
      <h1 class="app-title">إنشاء حساب جديد</h1>
      <p class="app-subtitle">سجّل مستخدماً جديداً في نظام حساباتي</p>
    </div>

    <form (submit)="$event.preventDefault(); onRegister()" class="auth-form">
      @if (error()) {
        <div class="error-message">
          <span class="material-icons-round">error_outline</span>
          <span>{{ error() }}</span>
        </div>
      }

      <div class="field-group">
        <label class="field-label">
          <span class="material-icons-round">person</span>
          الاسم الكامل
        </label>
        <div class="input-wrapper">
          <input
            type="text"
            class="input-3d"
            placeholder="الاسم الكامل"
            [formField]="registerForm.fullName"
            autocomplete="name"
          />
          <div class="input-highlight"></div>
        </div>
      </div>

      <div class="field-group">
        <label class="field-label">
          <span class="material-icons-round">badge</span>
          اسم المستخدم
        </label>
        <div class="input-wrapper">
          <input
            type="text"
            class="input-3d"
            placeholder="اسم الدخول"
            [formField]="registerForm.username"
            autocomplete="username"
          />
          <div class="input-highlight"></div>
        </div>
      </div>

      <div class="field-group">
        <label class="field-label">
          <span class="material-icons-round">lock</span>
          كلمة المرور
        </label>
        <div class="input-wrapper">
          <div class="password-wrapper">
            <input
              [type]="showPassword() ? 'text' : 'password'"
              class="input-3d"
              placeholder="8 أحرف على الأقل، حرف ورقم"
              [formField]="registerForm.password"
              autocomplete="new-password"
            />
            <button type="button" class="toggle-password" (click)="togglePassword()">
              <span class="material-icons-round">
                {{ showPassword() ? 'visibility_off' : 'visibility' }}
              </span>
            </button>
          </div>
          <div class="input-highlight"></div>
        </div>
      </div>

      <div class="field-group">
        <label class="field-label">
          <span class="material-icons-round">admin_panel_settings</span>
          الدور
        </label>
        <div class="input-wrapper">
          <select
            class="input-3d"
            [value]="registerModel().role"
            (change)="registerModel.update(v => ({...v, role: $any($event.target).value}))"
          >
            @for (opt of roleOptions; track opt.value) {
              <option [value]="opt.value">{{ opt.label }}</option>
            }
          </select>
          <div class="input-highlight"></div>
        </div>
      </div>

      <button type="submit" class="submit-btn" [disabled]="isLoading()">
        @if (isLoading()) {
          <div class="spinner"></div>
          <span>جاري إنشاء الحساب...</span>
        } @else {
          <span class="material-icons-round">person_add</span>
          <span>إنشاء الحساب</span>
        }
        <div class="btn-shine"></div>
      </button>
    </form>

    <div class="auth-footer">
      <div class="footer-line"></div>
      <p>
        لديك حساب؟
        <a routerLink="/login" class="link">تسجيل الدخول</a>
      </p>
    </div>
  </div>
</div>
