<div class="register-page">
  <!-- Background -->
  <div class="register-bg"></div>

  <!-- Card -->
  <div class="register-card">

    <!-- Logo -->
    <div class="register-logo">
      <div class="logo-icon-wrap">
        <span class="material-icons-round">bolt</span>
      </div>
      <h1 class="app-name">حساباتي</h1>
      <p class="app-desc">إنشاء حساب مستخدم جديد</p>
    </div>

    <!-- Form -->
    <form class="register-form" (submit)="$event.preventDefault(); onRegister()">

      <!-- Error -->
      @if (error()) {
        <div class="alert-error">
          <span class="material-icons-round">error_outline</span>
          <span>{{ error() }}</span>
        </div>
      }

      <!-- Full Name -->
      <div class="form-field">
        <label class="field-label">الاسم الكامل</label>
        <div class="input-with-icon">
          <span class="input-icon material-icons-round">person_outline</span>
          <input
            type="text"
            class="valex-input"
            placeholder="أدخل الاسم الكامل"
            [value]="fullName()"
            (input)="fullName.set($any($event.target).value)"
            autocomplete="name"
          />
        </div>
      </div>

      <!-- Username -->
      <div class="form-field">
        <label class="field-label">اسم المستخدم</label>
        <div class="input-with-icon">
          <span class="input-icon material-icons-round">badge</span>
          <input
            type="text"
            class="valex-input"
            placeholder="اسم الدخول"
            [value]="username()"
            (input)="username.set($any($event.target).value)"
            autocomplete="username"
          />
        </div>
      </div>

      <!-- Password -->
      <div class="form-field">
        <label class="field-label">كلمة المرور</label>
        <div class="input-with-icon">
          <span class="input-icon material-icons-round">lock_outline</span>
          <input
            [type]="showPassword() ? 'text' : 'password'"
            class="valex-input has-toggle"
            placeholder="8 أحرف على الأقل، حرف ورقم"
            [value]="password()"
            (input)="password.set($any($event.target).value)"
            autocomplete="new-password"
          />
          <button type="button" class="toggle-btn" (click)="togglePassword()">
            <span class="material-icons-round">
              {{ showPassword() ? 'visibility_off' : 'visibility' }}
            </span>
          </button>
        </div>
      </div>

      <!-- Role -->
      <div class="form-field">
        <label class="field-label">الدور الوظيفي</label>
        <div class="input-with-icon">
          <span class="input-icon material-icons-round">admin_panel_settings</span>
          <select
            class="valex-input valex-select"
            [value]="role()"
            (change)="role.set($any($event.target).value)"
          >
            @for (opt of roleOptions; track opt.value) {
              <option [value]="opt.value">{{ opt.label }}</option>
            }
          </select>
        </div>
      </div>

      <!-- Submit -->
      <button type="submit" class="btn-submit" [disabled]="isLoading()">
        @if (isLoading()) {
          <div class="btn-spinner"></div>
          <span>جاري إنشاء الحساب...</span>
        } @else {
          <span class="material-icons-round">person_add</span>
          <span>إنشاء الحساب</span>
        }
      </button>

    </form>

    <!-- Footer -->
    <div class="register-footer">
      <span class="footer-text">لديك حساب بالفعل؟</span>
      <a routerLink="/login" class="footer-link">تسجيل الدخول</a>
    </div>

  </div>
</div>
