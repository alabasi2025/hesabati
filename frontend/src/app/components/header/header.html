<header class="app-header">
  <div class="header-right">
    <h1 class="page-title">
      @if (biz.currentBusinessName()) {
        <span class="biz-name" [style.color]="biz.currentBusinessColor()">{{ biz.currentBusinessName() }}</span>
        <span class="separator">|</span>
      }
      {{ pageTitle() }}
    </h1>
    <span class="page-date">{{ getCurrentDate() }}</span>
  </div>
  <div class="header-left">
    <!-- مؤشر حالة الاتصال بقاعدة البيانات -->
    <button class="db-status-btn" [title]="getDbStatusTitle()" (click)="checkDbHealth()">
      <span class="material-icons-round" [style.color]="getDbStatusColor()" [class.spin]="dbConnected() === null">
        {{ getDbStatusIcon() }}
      </span>
    </button>
    <button class="theme-toggle-btn" (click)="themeService.toggle()" [title]="themeService.isDark() ? 'الوضع النهاري' : 'الوضع الليلي'">
      <span class="material-icons-round">{{ themeService.isDark() ? 'light_mode' : 'dark_mode' }}</span>
    </button>
    <button class="header-btn" title="الإشعارات">
      <span class="material-icons-round">notifications</span>
    </button>
  </div>
</header>
