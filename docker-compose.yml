# ============================================================
# docker-compose.yml — hesabati full stack
# ============================================================
version: '3.9'

services:
  # ── PostgreSQL Database ──────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: hesabati-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hesabati}
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 774424555
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hesabati-net

  # ── Backend API ──────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: hesabati-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-hesabati}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-hesabati}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173}
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    volumes:
      - uploads_data:/app/uploads
    networks:
      - hesabati-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Nginx Reverse Proxy (optional) ──────────────────────
  nginx:
    image: nginx:alpine
    container_name: hesabati-nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_certs:/etc/nginx/certs
    networks:
      - hesabati-net
    profiles:
      - production

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local
  nginx_certs:
    driver: local

networks:
  hesabati-net:
    driver: bridge
