version: '3.8'

# ===================== أمان الإنتاج =====================
# في بيئة الإنتاج يجب تعيين المتغيرات التالية في ملف .env (لا تعتمد على القيم الافتراضية):
#   DB_PASSWORD   — كلمة مرور قوية لـ PostgreSQL
#   JWT_SECRET    — مفتاح عشوائي (مثلاً: openssl rand -hex 64)
#   ALLOWED_ORIGINS — النطاقات المسموحة للواجهة (مفصولة بفاصلة)
# انسخ .env.example إلى .env وعدّل القيم قبل التشغيل في الإنتاج.

services:
  # ===================== قاعدة البيانات =====================
  postgres:
    image: postgres:16-alpine
    container_name: hesabati-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hesabati}
      POSTGRES_USER: postgres
      # للتطوير المحلي فقط: قيمة افتراضية — في الإنتاج عيّن DB_PASSWORD في .env (انظر .env.example)
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev_local_only}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=en_US.utf8 --lc-ctype=en_US.utf8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hesabati-network

  # ===================== الباكند =====================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hesabati-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # في الإنتاج عيّن DB_PASSWORD و JWT_SECRET في .env — لا تستخدم القيم الافتراضية
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-dev_local_only}@postgres:5432/${POSTGRES_DB:-hesabati}
      JWT_SECRET: ${JWT_SECRET:-CHANGE_ME_IN_PRODUCTION}
      PORT: 3000
      NODE_ENV: production
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost}
      DB_MAX_CONNECTIONS: 20
      DB_IDLE_TIMEOUT: 20
      DB_CONNECT_TIMEOUT: 10
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    networks:
      - hesabati-network

  # ===================== الفرونتند + Nginx =====================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hesabati-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # لإضافة SSL لاحقاً:
      # - ./ssl/cert.pem:/etc/nginx/ssl/cert.pem:ro
      # - ./ssl/key.pem:/etc/nginx/ssl/key.pem:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - hesabati-network

volumes:
  postgres_data:
    driver: local

networks:
  hesabati-network:
    driver: bridge
